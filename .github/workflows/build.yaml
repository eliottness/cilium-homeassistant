name: Build and Push Addon

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  discover-cilium-latest:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Fetch latest stable Cilium version
        id: version
        run: |
          VERSION=$(curl -s "https://api.github.com/repos/cilium/cilium/releases?per_page=20" \
            | jq -r '[.[] | select(.prerelease == false and .draft == false) | .tag_name | ltrimstr("v")] | sort_by(split(".") | map(tonumber)) | last')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Latest Cilium: ${VERSION}"

  build:
    needs: discover-cilium-latest
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        arch: [aarch64, amd64]
        include:
          - arch: aarch64
            platform: linux/arm64
          - arch: amd64
            platform: linux/amd64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract version from config.yaml
        id: addon_version
        run: |
          VERSION=$(grep '^version:' cilium-router/config.yaml | awk '{print $2}' | tr -d '"')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${VERSION}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: cilium-router
          file: cilium-router/Dockerfile
          platforms: ${{ matrix.platform }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/cilium-homeassistant/${{ matrix.arch }}-cilium-router:${{ steps.addon_version.outputs.tag }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/cilium-homeassistant/${{ matrix.arch }}-cilium-router:latest
          build-args: |
            CILIUM_VERSION=${{ needs.discover-cilium-latest.outputs.version }}
            BUILD_ARCH=${{ matrix.arch }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            BUILD_DESCRIPTION=Routes traffic to Kubernetes pods via Cilium agent
            BUILD_NAME=Cilium Router
            BUILD_REF=${{ github.sha }}
            BUILD_REPOSITORY=${{ github.repository }}
            BUILD_VERSION=${{ steps.addon_version.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

name: Build and Push Addon

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        arch: [aarch64, amd64]
        cilium_version: ["1.19.0", "1.19.1"]
        include:
          - arch: aarch64
            platform: linux/arm64
          - arch: amd64
            platform: linux/amd64
          # Mark 1.19.1 as default (gets the "latest" tag)
          - cilium_version: "1.19.1"
            is_default: true
          - cilium_version: "1.19.0"
            is_default: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract version from config.yaml
        id: version
        run: |
          VERSION=$(grep '^version:' cilium-router/config.yaml | awk '{print $2}' | tr -d '"')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${VERSION}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build tags
        id: tags
        run: |
          BASE="${{ env.REGISTRY }}/${{ github.repository_owner }}/cilium-homeassistant/${{ matrix.arch }}-cilium-router"
          TAGS="${BASE}:${{ steps.version.outputs.tag }}-cilium${{ matrix.cilium_version }}"
          if [[ "${{ matrix.is_default }}" == "true" ]]; then
            TAGS="${TAGS},${BASE}:${{ steps.version.outputs.tag }},${BASE}:latest"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: cilium-router
          file: cilium-router/Dockerfile
          platforms: ${{ matrix.platform }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            CILIUM_VERSION=${{ matrix.cilium_version }}
            BUILD_ARCH=${{ matrix.arch }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            BUILD_DESCRIPTION=Routes traffic to Kubernetes pods via Cilium agent
            BUILD_NAME=Cilium Router
            BUILD_REF=${{ github.sha }}
            BUILD_REPOSITORY=${{ github.repository }}
            BUILD_VERSION=${{ steps.version.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

name: "Cilium Router"
version: "0.1.0"
slug: "cilium_router"
description: "Routes traffic to Kubernetes pods via Cilium agent"
url: "https://github.com/eliottness/cilium-homeassistant"
arch:
  - aarch64
  - amd64
startup: "system"
boot: "manual"
init: true

# Full network + BPF access (matches DaemonSet security context)
host_network: true
privileged:
  - NET_ADMIN
  - NET_RAW
  - SYS_ADMIN
  - SYS_MODULE
  - SYS_RESOURCE
  - DAC_READ_SEARCH
apparmor: false
full_access: true   # Needed for /sys/fs/bpf, /lib/modules, /proc/sys

image: "ghcr.io/eliottness/cilium-homeassistant/{arch}-cilium-router"

options:
  kubeconfig: ""
  node_name: "ha-cilium"
  log_level: "info"

schema:
  kubeconfig: str
  node_name: str
  log_level: "list(info|debug|warning|error)"

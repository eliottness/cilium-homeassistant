name: "Cilium Router"
version: "0.1.1"
slug: "cilium_router"
description: "Routes traffic to Kubernetes pods via Cilium agent"
url: "https://github.com/eliottness/cilium-homeassistant"
arch:
  - aarch64
  - amd64
startup: "system"
boot: "manual"
init: false

# Full network + BPF access (matches DaemonSet security context)
host_network: true
host_pid: true
privileged:
  - CHOWN
  - KILL
  - NET_ADMIN
  - NET_RAW
  - IPC_LOCK
  - SYS_MODULE
  - SYS_ADMIN
  - SYS_RESOURCE
  - SYS_PTRACE
  - SYS_CHROOT
  - DAC_OVERRIDE
  - FOWNER
  - SETGID
  - SETUID
  - SYSLOG
apparmor: false
full_access: true   # Needed for /sys/fs/bpf, /lib/modules, /proc/sys

image: "ghcr.io/eliottness/cilium-homeassistant/{arch}-cilium-router"

map:
  - config:rw
  - share:rw
  - ssl:ro

options:
  kubeconfig_path: "/config/kubeconfig"
  node_name: "ha-cilium"
  log_level: "info"
  cilium_namespace: "kube-system"

schema:
  kubeconfig_path: str
  node_name: str
  log_level: "list(info|debug|warning|error)"
  cilium_namespace: str
